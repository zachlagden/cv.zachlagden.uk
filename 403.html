<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/tailwind.css" />
    <title>403 - Forbidden Access</title>
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center p-6">
      <div class="text-center space-y-6 max-w-2xl mx-auto">
        <div class="flex justify-center">
          <div class="relative">
            <div class="text-9xl font-bold text-red-600">403</div>
          </div>
        </div>

        <div class="space-y-4">
          <h1 class="text-3xl font-bold text-gray-800">Access Forbidden</h1>
          <p class="text-gray-600">
            You don't have permission to access this resource.
          </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <a
            href="/"
            class="inline-flex items-center justify-center gap-2 bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition-colors"
          >
            <i data-lucide="home" class="w-5 h-5"></i>
            Go Home
          </a>
        </div>
      </div>
    </main>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/smoothscroll/1.5.1/SmoothScroll.min.js"
      integrity="sha512-BkMKSo7sGBeDmtIyZoyInJbrI/XqQ1ez6SZotOL0e+iT6tzOjBmtMpWWPUVbcdqLbaukREItSDV2aohX+9gBlw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
